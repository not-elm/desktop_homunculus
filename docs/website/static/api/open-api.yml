openapi: 3.1.0
info:
  title: Homunculus API
  description: Desktop Homunculus HTTP API for controlling VRM characters, webviews, audio, and more.
  contact:
    name: notelm
    email: elmprograminfo@gmail.com
  license:
    name: LGPL-3.0-only
  version: 1.0.0
servers:
- url: http://localhost:3100
  description: Local development
paths:
  /app/exit:
    post:
      tags:
      - app
      summary: Exit the application gracefully.
      operationId: exit
      responses:
        '200':
          description: Application exit initiated
        '500':
          description: Internal server error
  /app/health:
    get:
      tags:
      - app
      summary: Returns a simple health check response.
      operationId: health
      responses:
        '200':
          description: Health check passed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /app/info:
    get:
      tags:
      - app
      summary: Returns application metadata including version, platform, features, and loaded mods.
      operationId: get
      responses:
        '200':
          description: Application info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppInfo'
  /assets:
    get:
      tags:
      - assets
      summary: List available assets, optionally filtered by type or mod name.
      operationId: list
      parameters:
      - name: type
        in: query
        description: Filter by asset type
        required: false
        schema:
          type: string
      - name: mod
        in: query
        description: Filter by mod name
        required: false
        schema:
          type: string
      responses:
        '200':
          description: List of assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssetInfo'
  /audio/bgm:
    get:
      tags:
      - audio
      summary: Get current BGM status.
      operationId: bgm_status
      responses:
        '200':
          description: Current BGM status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BgmStatus'
    post:
      tags:
      - audio
      summary: Play background music (replaces current BGM).
      operationId: bgm_play
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BgmPlayRequest'
        required: true
      responses:
        '204':
          description: BGM playback started
        '400':
          description: Invalid request
    patch:
      tags:
      - audio
      summary: Update BGM settings (volume, speed).
      operationId: bgm_update
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BgmUpdateRequest'
        required: true
      responses:
        '204':
          description: BGM settings updated
        '409':
          description: BGM not playing
  /audio/bgm/pause:
    post:
      tags:
      - audio
      summary: Pause background music.
      operationId: bgm_pause
      responses:
        '204':
          description: BGM paused
        '409':
          description: BGM not playing
  /audio/bgm/resume:
    post:
      tags:
      - audio
      summary: Resume background music.
      operationId: bgm_resume
      responses:
        '204':
          description: BGM resumed
        '409':
          description: BGM not paused
  /audio/bgm/stop:
    post:
      tags:
      - audio
      summary: Stop background music.
      operationId: bgm_stop
      requestBody:
        description: Optional fade-out settings
        content:
          application/json:
            schema:
              oneOf:
              - type: 'null'
              - $ref: '#/components/schemas/BgmStopRequest'
      responses:
        '204':
          description: BGM stopped
        '409':
          description: BGM not playing
  /audio/se:
    post:
      tags:
      - audio
      summary: Play a one-shot sound effect.
      operationId: se_play
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SePlayRequest'
        required: true
      responses:
        '204':
          description: Sound effect played
        '400':
          description: Invalid request
  /characters:
    get:
      tags:
      - characters
      summary: List all characters.
      operationId: list
      responses:
        '200':
          description: List of characters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CharacterInfo'
    post:
      tags:
      - characters
      summary: Create a new character.
      description: |-
        If a character with the given ID already exists, its info is returned
        without creating a duplicate (upsert semantics).
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBody'
        required: true
      responses:
        '200':
          description: Character created or existing returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterInfo'
        '400':
          description: Invalid character ID
  /characters/{id}:
    get:
      tags:
      - characters
      summary: Get detailed information about a single character.
      operationId: get
      parameters:
      - name: id
        in: path
        description: Character ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Character detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterDetail'
        '404':
          description: Character not found
    delete:
      tags:
      - characters
      summary: Destroy a character.
      operationId: destroy
      parameters:
      - name: id
        in: path
        description: Character ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Character destroyed
        '404':
          description: Character not found
  /characters/{id}/extensions:
    get:
      tags:
      - characters
      summary: Get extension data for a specific mod on a character.
      operationId: get_extension
      parameters:
      - name: id
        in: path
        description: Character ID
        required: true
        schema:
          type: string
      - name: mod
        in: query
        description: Mod package name (e.g. @hmcs/voicevox)
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Extension data
          content:
            application/json:
              schema: {}
        '404':
          description: Character or extension not found
    put:
      tags:
      - characters
      summary: Set extension data for a specific mod on a character.
      operationId: set_extension
      parameters:
      - name: id
        in: path
        description: Character ID
        required: true
        schema:
          type: string
      - name: mod
        in: query
        description: Mod package name (e.g. @hmcs/voicevox)
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema: {}
        required: true
      responses:
        '200':
          description: Extension data updated
        '404':
          description: Character not found
    delete:
      tags:
      - characters
      summary: Delete extension data for a specific mod on a character.
      operationId: delete_extension
      parameters:
      - name: id
        in: path
        description: Character ID
        required: true
        schema:
          type: string
      - name: mod
        in: query
        description: Mod package name (e.g. @hmcs/voicevox)
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Extension data deleted
        '404':
          description: Character not found
  /characters/{id}/name:
    get:
      tags:
      - characters
      summary: Get the display name of a character.
      operationId: get_name
      parameters:
      - name: id
        in: path
        description: Character ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Character name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PutNameBody'
        '404':
          description: Character not found
    put:
      tags:
      - characters
      summary: Update the display name of a character.
      operationId: put_name
      parameters:
      - name: id
        in: path
        description: Character ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutNameBody'
        required: true
      responses:
        '200':
          description: Name updated
        '404':
          description: Character not found
  /characters/{id}/persona:
    get:
      tags:
      - characters
      summary: Get the persona of a character.
      operationId: get_persona
      parameters:
      - name: id
        in: path
        description: Character ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Character persona
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Persona'
        '404':
          description: Character not found
    put:
      tags:
      - characters
      summary: Update the persona of a character.
      operationId: put_persona
      parameters:
      - name: id
        in: path
        description: Character ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Persona'
        required: true
      responses:
        '200':
          description: Persona updated
        '404':
          description: Character not found
  /characters/{id}/state:
    get:
      tags:
      - characters
      summary: Get the current state of a character.
      operationId: get_state
      parameters:
      - name: id
        in: path
        description: Character ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Character state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PutStateBody'
        '404':
          description: Character not found
    put:
      tags:
      - characters
      summary: Update the state of a character.
      operationId: put_state
      parameters:
      - name: id
        in: path
        description: Character ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutStateBody'
        required: true
      responses:
        '200':
          description: State updated
        '404':
          description: Character not found
  /characters/{id}/vrm:
    delete:
      tags:
      - characters
      summary: Detach the VRM model from a character.
      operationId: detach_vrm
      parameters:
      - name: id
        in: path
        description: Character ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: VRM detached
        '404':
          description: Character not found
        '422':
          description: No VRM attached
  /characters/{id}/vrm/attach:
    post:
      tags:
      - characters
      summary: Attach a VRM model to a character.
      operationId: attach_vrm
      parameters:
      - name: id
        in: path
        description: Character ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachVrmBody'
        required: true
      responses:
        '200':
          description: VRM attached
        '404':
          description: Character not found
  /commands/execute:
    post:
      tags:
      - commands
      summary: Execute a mod command with NDJSON streaming output.
      operationId: execute_command
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteCommandRequest'
        required: true
      responses:
        '200':
          description: NDJSON stream of command events
          content:
            application/x-ndjson: {}
        '400':
          description: Invalid request
  /coordinates/to-viewport:
    get:
      tags:
      - coordinates
      summary: Convert world coordinates to global viewport coordinates.
      operationId: global_viewport
      parameters:
      - name: x
        in: query
        description: X-coordinate in world space
        required: false
        schema:
          type: number
          format: float
      - name: y
        in: query
        description: Y-coordinate in world space
        required: false
        schema:
          type: number
          format: float
      - name: z
        in: query
        description: Z-coordinate in world space
        required: false
        schema:
          type: number
          format: float
      responses:
        '200':
          description: Global viewport coordinates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalViewport'
        '500':
          description: Conversion failed
  /coordinates/to-world:
    get:
      tags:
      - coordinates
      summary: Convert a global viewport position to a 2D world position.
      operationId: world_2d
      parameters:
      - name: x
        in: query
        description: X-coordinate in global viewport
        required: false
        schema:
          type: number
          format: float
      - name: y
        in: query
        description: Y-coordinate in global viewport
        required: false
        schema:
          type: number
          format: float
      responses:
        '200':
          description: 2D world position
          content:
            application/json:
              schema:
                type: array
                items:
                  type: number
                  format: float
        '500':
          description: Conversion failed
  /displays:
    get:
      tags:
      - displays
      summary: Get all display information.
      operationId: all
      responses:
        '200':
          description: List of all displays
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalDisplays'
  /effects/stamps:
    post:
      tags:
      - effects
      summary: Show a stamp effect.
      operationId: stamp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StampRequestBody'
        required: true
      responses:
        '200':
          description: Stamp effect displayed
        '400':
          description: Invalid request
  /entities:
    get:
      tags:
      - entities
      summary: Find an entity by its name.
      description: If `root` entity is specified, it will search recursively from that entity's children.
      operationId: get
      parameters:
      - name: name
        in: query
        description: Entity name to search for
        required: true
        schema:
          type: string
      - name: root
        in: query
        description: Root entity to search from recursively
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Found entity ID
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Entity not found
  /entities/{entity}/move:
    post:
      tags:
      - entities
      summary: Move an entity to a target position.
      operationId: move_to
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveTarget'
        required: true
      responses:
        '200':
          description: Entity moved
        '404':
          description: Entity not found
        '422':
          description: Invalid move target
  /entities/{entity}/name:
    get:
      tags:
      - entities
      summary: Get the entity name.
      operationId: get
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Entity name
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Entity not found
  /entities/{entity}/transform:
    get:
      tags:
      - entities
      summary: Get the transform of an entity.
      operationId: get
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Entity transform
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptionalTransform'
        '404':
          description: Entity not found
    put:
      tags:
      - entities
      summary: Set the transform of an entity.
      operationId: put
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptionalTransform'
        required: true
      responses:
        '200':
          description: Updated transform
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptionalTransform'
        '404':
          description: Entity not found
  /entities/{entity}/tween/position:
    post:
      tags:
      - entities
      summary: Tween an entity's position to a target value.
      operationId: tween_position
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TweenPositionRequest'
        required: true
      responses:
        '200':
          description: Position tween started
        '400':
          description: Invalid duration
        '404':
          description: Entity not found
  /entities/{entity}/tween/rotation:
    post:
      tags:
      - entities
      summary: Tween an entity's rotation to a target value.
      operationId: tween_rotation
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TweenRotationRequest'
        required: true
      responses:
        '200':
          description: Rotation tween started
        '400':
          description: Invalid duration
        '404':
          description: Entity not found
  /entities/{entity}/tween/scale:
    post:
      tags:
      - entities
      summary: Tween an entity's scale to a target value.
      operationId: tween_scale
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TweenScaleRequest'
        required: true
      responses:
        '200':
          description: Scale tween started
        '400':
          description: Invalid duration
        '404':
          description: Entity not found
  /mods:
    get:
      tags:
      - mods
      summary: List all loaded mods.
      operationId: list
      responses:
        '200':
          description: List of loaded mods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModInfo'
  /mods/by-name:
    get:
      tags:
      - mods
      summary: Get a single mod by name.
      operationId: get_one
      parameters:
      - name: name
        in: query
        description: Mod package name (e.g. @hmcs/voicevox)
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Mod information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModInfo'
        '404':
          description: Mod not found
  /mods/menus:
    get:
      tags:
      - mods
      summary: List all registered mod menus.
      operationId: list_menus
      responses:
        '200':
          description: List of mod menus
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModMenuMetadata'
  /preferences:
    get:
      tags:
      - preferences
      summary: List all saved preference keys.
      operationId: list
      responses:
        '200':
          description: List of preference keys
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /preferences/{key}:
    get:
      tags:
      - preferences
      summary: Load a preference value by key.
      operationId: load
      parameters:
      - name: key
        in: path
        description: Preference key
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Preference value
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Preference not found
    put:
      tags:
      - preferences
      summary: Save a preference value by key.
      operationId: save
      parameters:
      - name: key
        in: path
        description: Preference key
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
        required: true
      responses:
        '200':
          description: Preference saved
  /rpc/call:
    post:
      tags:
      - rpc
      summary: Proxy `POST /rpc/call` to the MOD service's local HTTP server.
      description: |-
        The caller specifies `modName` and `method` in the JSON body, along with
        an optional `body` field that is forwarded to the MOD service.

        Error codes:
        - `503` — MOD not registered (not yet started or crashed)
        - `404` — method unknown for this MOD
        - `504` — MOD service timed out
        - `502` — MOD service refused the connection
      operationId: call
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CallRequest'
        required: true
      responses:
        '200':
          description: RPC method response (JSON)
        '404':
          description: Method not found
        '502':
          description: MOD service unreachable
        '503':
          description: MOD not registered
        '504':
          description: Timeout exceeded
  /rpc/deregister:
    post:
      tags:
      - rpc
      summary: Deregister a MOD service's RPC endpoint.
      operationId: deregister
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeregisterRequest'
        required: true
      responses:
        '200':
          description: MOD deregistered
        '500':
          description: Registry lock poisoned
  /rpc/register:
    post:
      tags:
      - rpc
      summary: Register or update a MOD service's RPC methods.
      description: |-
        The MOD service calls this endpoint on startup.  The port must have been
        pre-allocated by the engine; this handler updates the methods map for that
        port.
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '200':
          description: Methods registered
        '404':
          description: MOD has no pre-allocated port
        '500':
          description: Registry lock poisoned
  /rpc/registrations:
    get:
      tags:
      - rpc
      summary: List all current RPC registrations (for introspection / debugging).
      operationId: list_registrations
      responses:
        '200':
          description: Current registrations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationsResponse'
        '500':
          description: Registry lock poisoned
  /settings/fps:
    get:
      tags:
      - settings
      summary: Get the current frame rate (FPS).
      operationId: get
      responses:
        '200':
          description: Current FPS
          content:
            text/plain:
              schema:
                type: number
                format: double
    put:
      tags:
      - settings
      summary: Set the frame rate (FPS). Persists and applies immediately.
      operationId: put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetFpsBody'
        required: true
      responses:
        '200':
          description: FPS updated
  /shadow-panel/alpha:
    get:
      tags:
      - shadow-panel
      summary: Get the current alpha value of the shadow panel.
      operationId: get
      responses:
        '200':
          description: Current alpha value
          content:
            text/plain:
              schema:
                type: number
                format: float
        '400':
          description: Shadow panel not available
    put:
      tags:
      - shadow-panel
      summary: Set the alpha value of the shadow panel.
      description: |-
        The value set here is saved in the internal database under the key `shadow_panel::alpha`.
        When the application starts, the alpha value is read from this key and applied to the shadow panel's material.
      operationId: put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShadowPanelPutBody'
        required: true
      responses:
        '200':
          description: Alpha value updated
        '400':
          description: Shadow panel not available
  /signals:
    get:
      tags:
      - signals
      summary: List all active signal channels.
      operationId: list
      responses:
        '200':
          description: List of active signal channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SignalInfo'
  /signals/{signal}:
    get:
      tags:
      - signals
      summary: Stream events for a specific signal via SSE.
      description: The signals are sent via `POST /signals/{signal}` API.
      operationId: stream
      parameters:
      - name: signal
        in: path
