components:
  schemas:
    AppInfo:
      type: object
      required:
      - version
      - platform
      - features
      - mods
      properties:
        features:
          type: array
          items:
            type: string
        mods:
          type: array
          items:
            $ref: '#/components/schemas/ModInfo'
        platform:
          $ref: '#/components/schemas/PlatformInfo'
        version:
          type: string
    AssetDeclaration:
      type: object
      description: A single declared asset entry from a MOD's package.json.
      required:
      - path
      - type
      properties:
        description:
          type:
          - string
          - 'null'
          description: Human-readable description (used by LLM agents for asset selection).
        path:
          type: string
          description: File path relative to the MOD root directory.
        type:
          $ref: '#/components/schemas/AssetType'
          description: Asset type.
    AssetId:
      type: string
      description: |-
        A strongly-typed asset identifier.

        Wraps a `String` but provides type safety so arbitrary strings cannot be
        passed where an asset ID is expected. Serializes transparently as a plain
        JSON string so the HTTP/JSON API schema is unchanged.
    AssetInfo:
      type: object
      required:
      - id
      - type
      - mod
      properties:
        description:
          type:
          - string
          - 'null'
        id:
          $ref: '#/components/schemas/AssetId'
        mod:
          type: string
        type:
          $ref: '#/components/schemas/AssetType'
    AssetRequest:
      type: object
      required:
      - asset
      properties:
        asset:
          $ref: '#/components/schemas/AssetId'
    AssetType:
      type: string
      description: Type of mod asset.
      enum:
      - vrm
      - vrma
      - sound
      - image
      - html
    AttachVrmBody:
      type: object
      description: Request body for attaching a VRM model.
      required:
      - assetId
      properties:
        assetId:
          type: string
          description: The asset ID of the VRM model to attach.
    BgmPlayRequest:
      type: object
      required:
      - asset
      properties:
        asset:
          $ref: '#/components/schemas/AssetId'
        fadeIn:
          type:
          - object
          - 'null'
        loop:
          type: boolean
        speed:
          type: number
          format: double
        volume:
          type: number
          format: double
    BgmPlaybackState:
      type: string
      enum:
      - playing
      - paused
      - stopped
    BgmStatus:
      type: object
      required:
      - state
      - loop
      - volume
      - speed
      properties:
        asset:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/AssetId'
        loop:
          type: boolean
        speed:
          type: number
          format: double
