openapi: 3.1.0
info:
  title: Homunculus API
  description: Desktop Homunculus HTTP API for controlling VRM characters, webviews, audio, and more.
  contact:
    name: notelm
    email: elmprograminfo@gmail.com
  license:
    name: LGPL-3.0-only
  version: 1.0.0
servers:
- url: http://localhost:3100
  description: Local development
paths:
  /app/exit:
    post:
      tags:
      - app
      summary: Exit the application gracefully.
      operationId: exit
      responses:
        '200':
          description: Application exit initiated
        '500':
          description: Internal server error
  /app/health:
    get:
      tags:
      - app
      summary: Returns a simple health check response.
      operationId: health
      responses:
        '200':
          description: Health check passed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /app/info:
    get:
      tags:
      - app
      summary: Returns application metadata including version, platform, features, and loaded mods.
      operationId: get_app_info
      responses:
        '200':
          description: Application info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppInfo'
  /assets:
    get:
      tags:
      - assets
      summary: List available assets, optionally filtered by type or mod name.
      operationId: list_assets
      parameters:
      - name: type
        in: query
        description: Filter by asset type
        required: false
        schema:
          type: string
      - name: mod
        in: query
        description: Filter by mod name
        required: false
        schema:
          type: string
      responses:
        '200':
          description: List of assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssetInfo'
  /assets/file:
    get:
      tags:
      - assets
      summary: Get the raw file content of an asset by its ID.
      description: |-
        Returns the file bytes with a `Content-Type` header inferred from
        the file extension. Unknown extensions fall back to
        `application/octet-stream`.
      operationId: get_asset_file
      parameters:
      - name: id
        in: query
        description: Asset ID (e.g. '@hmcs/elmer:thumbnail')
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Raw file content
          content:
            application/octet-stream: {}
        '400':
          description: Missing id parameter
        '404':
          description: Asset not found or file missing
        '500':
          description: IO error
  /assets/import:
    post:
      tags:
      - assets
      summary: Import a local file as a managed asset.
      description: |-
        Copies the file to `~/.homunculus/assets/`, registers it in the
        asset registry, and persists the record in the database.
      operationId: import
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportAsset'
        required: true
      responses:
        '200':
          description: Asset imported successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportAssetResponse'
        '400':
          description: Invalid source path or parameters
  /audio/bgm:
    get:
      tags:
      - audio
      summary: Get current BGM status.
      operationId: bgm_status
      responses:
        '200':
          description: Current BGM status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BgmStatus'
    post:
      tags:
      - audio
      summary: Play background music (replaces current BGM).
      operationId: bgm_play
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BgmPlayRequest'
        required: true
      responses:
        '204':
          description: BGM playback started
        '400':
          description: Invalid request
    patch:
      tags:
      - audio
      summary: Update BGM settings (volume, speed).
      operationId: bgm_update
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BgmUpdateRequest'
        required: true
      responses:
        '204':
          description: BGM settings updated
        '409':
          description: BGM not playing
  /audio/bgm/pause:
    post:
      tags:
      - audio
      summary: Pause background music.
      operationId: bgm_pause
      responses:
        '204':
          description: BGM paused
        '409':
          description: BGM not playing
  /audio/bgm/resume:
    post:
      tags:
      - audio
      summary: Resume background music.
      operationId: bgm_resume
      responses:
        '204':
          description: BGM resumed
        '409':
          description: BGM not paused
  /audio/bgm/stop:
    post:
      tags:
      - audio
      summary: Stop background music.
      operationId: bgm_stop
      requestBody:
        description: Optional fade-out settings
        content:
          application/json:
            schema:
              oneOf:
              - type: 'null'
              - $ref: '#/components/schemas/BgmStopRequest'
      responses:
        '204':
          description: BGM stopped
        '409':
          description: BGM not playing
  /audio/se:
    post:
      tags:
      - audio
      summary: Play a one-shot sound effect.
      operationId: se_play
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SePlayRequest'
        required: true
      responses:
        '204':
          description: Sound effect played
        '400':
          description: Invalid request
  /commands/execute:
    post:
      tags:
      - commands
      summary: Execute a mod command with NDJSON streaming output.
      operationId: execute_command
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteCommandRequest'
        required: true
      responses:
        '200':
          description: NDJSON stream of command events
          content:
            application/x-ndjson: {}
        '400':
          description: Invalid request
  /coordinates/to-viewport:
    get:
      tags:
      - coordinates
      summary: Convert world coordinates to global viewport coordinates.
      operationId: global_viewport
      parameters:
      - name: x
        in: query
        description: X-coordinate in world space
        required: false
        schema:
          type: number
          format: float
      - name: y
        in: query
        description: Y-coordinate in world space
        required: false
        schema:
          type: number
          format: float
      - name: z
        in: query
        description: Z-coordinate in world space
        required: false
        schema:
          type: number
          format: float
      responses:
        '200':
          description: Global viewport coordinates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalViewport'
        '500':
          description: Conversion failed
  /coordinates/to-world:
    get:
      tags:
      - coordinates
      summary: Convert a global viewport position to a 2D world position.
      operationId: world_2d
      parameters:
      - name: x
        in: query
        description: X-coordinate in global viewport
        required: false
        schema:
          type: number
          format: float
      - name: y
        in: query
        description: Y-coordinate in global viewport
        required: false
        schema:
          type: number
          format: float
      responses:
        '200':
          description: 2D world position
          content:
            application/json:
              schema:
                type: array
                items:
                  type: number
                  format: float
        '500':
          description: Conversion failed
  /dialog/pick-file:
    post:
      tags:
      - dialog
      summary: Open a native OS single-file picker dialog.
      description: |-
        Returns the selected file path. If the user cancels the dialog,
        `path` will be `null`. Optionally accepts filters and a default directory.
      operationId: pick_file
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: 'null'
              - $ref: '#/components/schemas/PickFileRequest'
      responses:
        '200':
          description: File selection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PickFileResponse'
  /dialog/pick-files:
    post:
      tags:
      - dialog
      summary: Open a native OS multi-file picker dialog.
      description: |-
        Returns the selected file paths. If the user cancels the dialog,
        `paths` will be an empty array. Optionally accepts filters and a default directory.
      operationId: pick_files
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: 'null'
              - $ref: '#/components/schemas/PickFileRequest'
      responses:
        '200':
          description: Multi-file selection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PickFilesResponse'
  /dialog/pick-folder:
    post:
      tags:
      - dialog
      summary: Open a native OS directory picker dialog.
      description: |-
        Returns the selected directory path. If the user cancels the dialog,
        `path` will be `null`. Optionally accepts a title and default directory.
      operationId: pick_folder
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: 'null'
              - $ref: '#/components/schemas/PickFolderRequest'
      responses:
        '200':
          description: Folder selection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PickFolderResponse'
  /displays:
    get:
      tags:
      - displays
      summary: Get all display information.
      operationId: all
      responses:
        '200':
          description: List of all displays
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalDisplays'
  /effects/stamps:
    post:
      tags:
      - effects
      summary: Show a stamp effect.
      operationId: stamp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StampRequestBody'
        required: true
      responses:
        '200':
          description: Stamp effect displayed
        '400':
          description: Invalid request
  /entities:
    get:
      tags:
      - entities
      summary: Find an entity by its name.
      description: If `root` entity is specified, it will search recursively from that entity's children.
      operationId: find_entity
      parameters:
      - name: name
        in: query
        description: Entity name to search for
        required: true
        schema:
          type: string
      - name: root
        in: query
        description: Root entity to search from recursively
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Found entity ID
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Entity not found
  /entities/{entity}/move:
    post:
      tags:
      - entities
      summary: Move an entity to a target position.
      operationId: move_to
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveTarget'
        required: true
      responses:
        '200':
          description: Entity moved
        '404':
          description: Entity not found
        '422':
          description: Invalid move target
  /entities/{entity}/name:
    get:
      tags:
      - entities
      summary: Get the entity name.
      operationId: get_entity_name
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Entity name
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Entity not found
  /entities/{entity}/transform:
    get:
      tags:
      - entities
      summary: Get the transform of an entity.
      operationId: get_transform
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Entity transform
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptionalTransform'
        '404':
          description: Entity not found
    put:
      tags:
      - entities
      summary: Set the transform of an entity.
      operationId: set_transform
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptionalTransform'
        required: true
      responses:
        '200':
          description: Updated transform
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptionalTransform'
        '404':
          description: Entity not found
  /entities/{entity}/tween/position:
    post:
      tags:
      - entities
      summary: Tween an entity's position to a target value.
      operationId: tween_position
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TweenPositionRequest'
        required: true
      responses:
        '200':
          description: Position tween started
        '400':
          description: Invalid duration
        '404':
          description: Entity not found
  /entities/{entity}/tween/rotation:
    post:
      tags:
      - entities
      summary: Tween an entity's rotation to a target value.
      operationId: tween_rotation
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TweenRotationRequest'
        required: true
      responses:
        '200':
          description: Rotation tween started
        '400':
          description: Invalid duration
        '404':
          description: Entity not found
  /entities/{entity}/tween/scale:
    post:
      tags:
      - entities
      summary: Tween an entity's scale to a target value.
      operationId: tween_scale
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TweenScaleRequest'
        required: true
      responses:
        '200':
          description: Scale tween started
        '400':
          description: Invalid duration
        '404':
          description: Entity not found
  /mods:
    get:
      tags:
      - mods
      summary: List all loaded mods.
      operationId: list_mods
      responses:
        '200':
          description: List of loaded mods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModInfo'
  /mods/menus:
    get:
      tags:
      - mods
      summary: List all registered mod menus.
      operationId: list_menus
      responses:
        '200':
          description: List of mod menus
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModMenuMetadata'
  /mods/{mod_name}:
    get:
      tags:
      - mods
      summary: Get a single mod by name.
      operationId: get_one
      parameters:
      - name: mod_name
        in: path
        description: Mod package name
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Mod information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModInfo'
        '404':
          description: Mod not found
  /personas:
    get:
      tags:
      - personas
      summary: List all personas.
      operationId: list_personas
      responses:
        '200':
          description: List of personas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PersonaSnapshot'
    post:
      tags:
      - personas
      summary: Create a new persona.
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePersona'
        required: true
      responses:
        '201':
          description: Persona created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonaSnapshot'
        '400':
          description: Invalid input
        '409':
          description: Persona already exists
  /personas/snapshot:
    get:
      tags:
      - personas
      summary: Get a full snapshot of all personas including transform and VRM state.
      operationId: snapshot
      responses:
        '200':
          description: Full state of all personas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PersonaFullSnapshot'
  /personas/stream:
    get:
      tags:
      - personas
      summary: Subscribe to a combined SSE stream of events from ALL personas.
      description: |-
        Each event is wrapped in `PersonaEvent<E>` containing the source `personaId`.
        Includes `persona-deleted` events that are not available on per-persona streams.
      operationId: stream
      responses:
        '200':
          description: Combined SSE stream of all persona events
          content:
            text/event-stream: {}
  /personas/{id}:
    get:
      tags:
      - personas
      summary: Get a single persona by ID.
      operationId: get_persona
      parameters:
      - name: id
        in: path
        description: Persona ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Persona details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonaSnapshot'
        '404':
          description: Persona not found
    delete:
      tags:
      - personas
      summary: Delete a persona.
      operationId: delete_persona
      parameters:
      - name: id
        in: path
        description: Persona ID
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Persona deleted
        '404':
          description: Persona not found
    patch:
      tags:
      - personas
      summary: Partially update a persona.
      operationId: update_persona
      parameters:
      - name: id
        in: path
        description: Persona ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchPersona'
        required: true
      responses:
        '200':
          description: Updated persona
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonaSnapshot'
        '404':
          description: Persona not found
  /personas/{id}/age:
    get:
      tags:
      - personas
      summary: Get the age of a persona.
      operationId: get_age
      parameters:
      - name: id
        in: path
        description: Persona ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgeBody'
        '404':
          description: ''
    put:
      tags:
      - personas
      summary: Set the age of a persona.
      operationId: put_age
      parameters:
      - name: id
        in: path
        description: Persona ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgeBody'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonaSnapshot'
        '404':
          description: ''
  /personas/{id}/despawn:
    post:
      tags:
      - personas
      summary: Despawn persona entity, retaining DB record.
      operationId: despawn
      parameters:
      - name: id
        in: path
        description: Persona ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Persona despawned
        '404':
          description: Not spawned
  /personas/{id}/events:
    get:
      tags:
      - personas
      summary: Subscribe to persona events via SSE.
      description: |-
        Always delivered: persona-change, state-change, vrm-attached, vrm-detached.
        Delivered only when VRM is attached: drag-start, drag, drag-end, pointer-press,
        pointer-click, pointer-move, pointer-release, pointer-over, pointer-out,
        pointer-cancel, expression-change, vrma-play, vrma-finish.
      operationId: events
      parameters:
      - name: id
        in: path
        description: Persona ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: SSE stream of persona events
          content:
            text/event-stream: {}
  /personas/{id}/first-person-pronoun:
    get:
      tags:
      - personas
      summary: Get the first-person pronoun of a persona.
      operationId: get_first_person_pronoun
      parameters:
      - name: id
        in: path
        description: Persona ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PronounBody'
        '404':
          description: ''
    put:
      tags:
      - personas
      summary: Set the first-person pronoun of a persona.
      operationId: put_first_person_pronoun
      parameters:
      - name: id
        in: path
        description: Persona ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PronounBody'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonaSnapshot'
        '404':
          description: ''
  /personas/{id}/gender:
    get:
      tags:
      - personas
      summary: Get the gender of a persona.
      operationId: get_gender
      parameters:
      - name: id
        in: path
        description: Persona ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenderBody'
        '404':
          description: ''
    put:
      tags:
      - personas
      summary: Set the gender of a persona.
      operationId: put_gender
      parameters:
      - name: id
        in: path
        description: Persona ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenderBody'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonaSnapshot'
        '404':
          description: ''
  /personas/{id}/metadata:
    get:
      tags:
      - personas
      summary: Get the metadata of a persona.
      operationId: get_metadata
      parameters:
      - name: id
        in: path
        description: Persona ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataBody'
        '404':
          description: ''
    put:
      tags:
      - personas
      summary: Set the metadata of a persona.
      operationId: put_metadata
      parameters:
      - name: id
        in: path
        description: Persona ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetadataBody'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonaSnapshot'
        '404':
          description: ''
  /personas/{id}/name:
    get:
      tags:
      - personas
      summary: Get the display name of a persona.
      operationId: get_name
      parameters:
      - name: id
        in: path
        description: Persona ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NameBody'
        '404':
          description: ''
    put:
      tags:
      - personas
      summary: Set the display name of a persona.
      operationId: put_name
      parameters:
      - name: id
        in: path
        description: Persona ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NameBody'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonaSnapshot'
        '404':
          description: ''
  /personas/{id}/personality:
    get:
      tags:
