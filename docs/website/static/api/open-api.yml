      oneOf:
      - type: object
        required:
        - url
        - type
        properties:
          type:
            type: string
            enum:
            - url
          url:
            type: string
      - type: object
        required:
        - type
        properties:
          content:
            type:
            - string
            - 'null'
          type:
            type: string
            enum:
            - html
      - type: object
        required:
        - id
        - type
        properties:
          id:
            $ref: '#/components/schemas/AssetId'
          type:
            type: string
            enum:
            - local
      description: |-
        Webview source information (response).
        In list responses (GET /webviews), Html content is omitted (None).
        In detail responses (GET /webviews/{id}), Html content is included.
    WeightsBody:
      type: object
      required:
      - weights
      properties:
        weights:
          type: object
          additionalProperties:
            type: number
            format: float
          propertyNames:
            type: string
