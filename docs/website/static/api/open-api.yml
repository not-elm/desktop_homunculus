  /rpc/call:
    post:
      tags:
      - rpc
      summary: Proxy `POST /rpc/call` to the MOD service's local HTTP server.
      description: |-
        The caller specifies `modName` and `method` in the JSON body, along with
        an optional `body` field that is forwarded to the MOD service.

        Error codes:
        - `503` — MOD not registered (not yet started or crashed)
        - `404` — method unknown for this MOD
        - `504` — MOD service timed out
        - `502` — MOD service refused the connection
      operationId: call
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CallRequest'
        required: true
      responses:
        '200':
          description: RPC method response (JSON)
        '404':
          description: Method not found
        '502':
          description: MOD service unreachable
        '503':
          description: MOD not registered
        '504':
          description: Timeout exceeded
  /rpc/deregister:
    post:
      tags:
      - rpc
      summary: Deregister a MOD service's RPC endpoint.
      operationId: deregister
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeregisterRequest'
        required: true
      responses:
        '200':
          description: MOD deregistered
        '500':
          description: Registry lock poisoned
  /rpc/register:
    post:
      tags:
      - rpc
      summary: Register or update a MOD service's RPC methods.
      description: |-
        The MOD service calls this endpoint on startup.  The port must have been
        pre-allocated by the engine; this handler updates the methods map for that
        port.
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '200':
          description: Methods registered
        '404':
          description: MOD has no pre-allocated port
        '500':
          description: Registry lock poisoned
