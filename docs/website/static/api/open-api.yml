    post:
      tags:
      - stt
      summary: Recognize a single sentence from the microphone.
      description: |-
        Starts a cpal capture -> VAD -> Whisper pipeline, returns the first
        recognized sentence, then destroys the pipeline. Long-polls until
        speech is detected or timeout (60s).
      operationId: recognize
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecognizeOptions'
        required: true
      responses:
        '200':
          description: Recognized text
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SttResult'
        '408':
          description: Timeout — no speech detected
        '422':
          description: Invalid language or model size
        '503':
          description: Model not available or microphone error
  /webviews:
    get:
      tags:
      - webviews
      summary: List all open webviews.
      operationId: list_webviews
      responses:
        '200':
          description: List of open webviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WebviewInfo'
    post:
      tags:
      - webviews
      summary: Open a global webview in world space.
      operationId: open
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebviewOpenOptions'
        required: true
      responses:
        '200':
          description: Webview opened, returns entity ID
          content:
            text/plain:
              schema:
                type: string
  /webviews/{entity}:
    get:
      tags:
      - webviews
      summary: Get detailed info for a specific webview.
      operationId: get_webview
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Webview info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebviewInfo'
        '404':
          description: Webview not found
    delete:
      tags:
      - webviews
      summary: Delete (close) a webview.
      operationId: delete_webview
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Webview closed
        '404':
          description: Webview not found
    patch:
      tags:
      - webviews
      summary: Partial update of a webview.
      operationId: update_webview
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebviewPatchRequest'
        required: true
      responses:
        '200':
          description: Webview updated
        '404':
          description: Webview not found
  /webviews/{entity}/is-closed:
    get:
      tags:
      - webviews
      summary: Check if a webview is closed.
      operationId: is_closed
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Webview closed status
          content:
            text/plain:
              schema:
                type: boolean
  /webviews/{entity}/linked-persona:
    get:
      tags:
      - webviews
      summary: Get the linked persona for a webview.
      operationId: get_linked_persona
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Linked persona ID
          content:
            application/json:
              schema:
                oneOf:
                - type: 'null'
                - $ref: '#/components/schemas/PersonaId'
    put:
      tags:
      - webviews
      summary: Set the linked persona for a webview.
      operationId: set_linked_persona
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetLinkedPersonaRequest'
        required: true
      responses:
        '200':
          description: Persona linked to webview
    delete:
      tags:
      - webviews
      summary: Remove the linked persona from a webview.
      operationId: unlink_persona
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Persona unlinked from webview
  /webviews/{entity}/navigate:
    post:
      tags:
      - webviews
      summary: Navigate to a new URL.
      operationId: navigate
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebviewNavigateRequest'
        required: true
      responses:
        '200':
          description: Navigation initiated
  /webviews/{entity}/navigate/back:
    post:
      tags:
      - webviews
      summary: Navigate back in history.
      operationId: navigate_back
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Navigated back
  /webviews/{entity}/navigate/forward:
    post:
      tags:
      - webviews
      summary: Navigate forward in history.
      operationId: navigate_forward
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Navigated forward
  /webviews/{entity}/navigation-state:
    get:
      tags:
      - webviews
      summary: Get navigation history state.
      operationId: navigation_state
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Navigation state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NavigationState'
        '404':
          description: Webview not found
  /webviews/{entity}/reload:
    post:
      tags:
      - webviews
      summary: Reload the current page.
      operationId: reload
      parameters:
      - name: entity
        in: path
        description: Entity ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Page reloaded
components:
  schemas:
    AgeBody:
      type: object
      properties:
        age:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
    AppInfo:
      type: object
      required:
      - version
      - platform
      - features
      - mods
      properties:
        features:
          type: array
          items:
            type: string
        mods:
          type: array
          items:
            $ref: '#/components/schemas/ModInfo'
        platform:
          $ref: '#/components/schemas/PlatformInfo'
        version:
          type: string
    AspectLockMode:
      type: string
      description: Aspect ratio lock behavior during resize drag.
      enum:
      - lockOnShift
      - always
      - never
    AssetDeclaration:
      type: object
      description: A single declared asset entry from a MOD's package.json.
      required:
      - path
      - type
      properties:
        description:
          type:
          - string
          - 'null'
          description: Human-readable description (used by LLM agents for asset selection).
        path:
          type: string
          description: File path relative to the MOD root directory.
        type:
          $ref: '#/components/schemas/AssetType'
          description: Asset type.
    AssetId:
      type: string
      description: |-
        A strongly-typed asset identifier.

        Wraps a `String` but provides type safety so arbitrary strings cannot be
        passed where an asset ID is expected. Serializes transparently as a plain
        JSON string so the HTTP/JSON API schema is unchanged.
    AssetInfo:
      type: object
      required:
      - id
      - type
      - mod
      properties:
        description:
          type:
          - string
          - 'null'
        id:
          $ref: '#/components/schemas/AssetId'
        mod:
          type: string
        type:
          $ref: '#/components/schemas/AssetType'
    AssetRequest:
      type: object
      required:
      - asset
      properties:
        asset:
          $ref: '#/components/schemas/AssetId'
    AssetType:
      type: string
      description: Type of mod asset.
      enum:
      - vrm
      - vrma
      - sound
      - image
      - html
    AttachVrmBody:
      type: object
      required:
      - assetId
      properties:
        assetId:
          type: string
          description: The asset ID of the VRM model to attach.
    BgmPlayRequest:
      type: object
      required:
      - asset
      properties:
        asset:
          $ref: '#/components/schemas/AssetId'
        fadeIn:
          type:
          - object
          - 'null'
        loop:
          type: boolean
        speed:
          type: number
          format: double
        volume:
          type: number
          format: double
    BgmPlaybackState:
      type: string
      enum:
      - playing
      - paused
      - stopped
    BgmStatus:
      type: object
      required:
      - state
      - loop
      - volume
      - speed
      properties:
        asset:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/AssetId'
        loop:
          type: boolean
        speed:
          type: number
          format: double
        state:
          $ref: '#/components/schemas/BgmPlaybackState'
        volume:
          type: number
          format: double
    BgmStopRequest:
      type: object
      properties:
        fadeOut:
          type:
          - object
          - 'null'
    BgmUpdateRequest:
      type: object
      properties:
        speed:
          type:
          - number
          - 'null'
          format: double
        tween:
          type:
          - object
          - 'null'
        volume:
          type:
          - number
          - 'null'
          format: double
    CallRequest:
      type: object
      description: Body for `POST /rpc/call`.
      required:
      - modName
      - method
      properties:
        body: {}
        method:
          type: string
        modName:
          type: string
    CreatePersona:
      type: object
      description: Arguments for creating a new persona.
      required:
      - id
      properties:
        age:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        firstPersonPronoun:
          type:
          - string
          - 'null'
        gender:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/Gender'
        id:
          type: string
        metadata:
          type:
          - object
          - 'null'
          additionalProperties:
            type: object
          propertyNames:
            type: string
        name:
          type:
          - string
          - 'null'
        personality:
          type:
          - string
          - 'null'
        profile:
          type:
          - string
          - 'null'
        thumbnail:
          type:
          - string
          - 'null'
        vrmAssetId:
          type:
          - string
          - 'null'
    DeregisterRequest:
      type: object
      description: Body for `POST /rpc/deregister`.
      required:
      - modName
      properties:
        modName:
          type: string
    DisplayId:
      type: integer
      format: int32
      minimum: 0
    EasingFunction:
      type: string
      description: |-
        Easing functions for tweening animations.

        Defines the rate of change of a parameter over time, allowing smooth transitions
        between values. Each variant represents a different mathematical curve that controls
        how the interpolation progresses from start to end.

        The naming convention follows: `{CurveName}{Direction}` where:
        - `In`: Slow start, fast end
        - `Out`: Fast start, slow end
        - `InOut`: Slow start and end, fast middle

        # Example
        ```
        use homunculus_api::entities::tween::EasingFunction;

        let easing = EasingFunction::QuadraticInOut;
        ```
      enum:
      - linear
      - quadraticIn
      - quadraticOut
      - quadraticInOut
      - cubicIn
      - cubicOut
      - cubicInOut
      - quarticIn
      - quarticOut
      - quarticInOut
      - quinticIn
      - quinticOut
      - quinticInOut
      - smoothStepIn
      - smoothStepOut
      - smoothStep
      - smootherStepIn
      - smootherStepOut
      - smootherStep
      - sineIn
      - sineOut
      - sineInOut
      - circularIn
      - circularOut
      - circularInOut
      - exponentialIn
      - exponentialOut
      - exponentialInOut
      - elasticIn
      - elasticOut
      - elasticInOut
      - backIn
      - backOut
      - backInOut
      - bounceIn
      - bounceOut
      - bounceInOut
    ExecuteCommandRequest:
      type: object
      description: Request body for `POST /commands/execute`.
      required:
      - command
      properties:
        args:
          type: array
          items:
            type: string
        command:
          type: string
        stdin:
          type:
          - string
          - 'null'
        timeoutMs:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
    ExpressionInfo:
      type: object
      required:
      - name
      - weight
      - isBinary
      - overrideBlink
      - overrideLookAt
      - overrideMouth
      properties:
        isBinary:
          type: boolean
        name:
          type: string
        overrideBlink:
          type: string
        overrideLookAt:
          type: string
        overrideMouth:
          type: string
        weight:
          type: number
          format: float
    ExpressionsResponse:
      type: object
      required:
      - expressions
      properties:
        expressions:
          type: array
          items:
            $ref: '#/components/schemas/ExpressionInfo'
    FileFilter:
      type: object
      description: A file type filter for native file dialogs.
      required:
      - name
      - extensions
      properties:
        extensions:
          type: array
          items:
            type: string
          description: File extensions without leading dot (e.g. `["png", "jpg"]`).
        name:
          type: string
          description: Display name for the filter (e.g. "Images").
    Gender:
      type: string
      description: Gender identity for a VRM character.
      enum:
      - male
      - female
      - other
      - unknown
    GenderBody:
      type: object
      required:
      - gender
      properties:
        gender:
          $ref: '#/components/schemas/Gender'
    GlobalDisplay:
      type: object
      required:
      - id
      - title
      - frame
      properties:
        frame:
          type: object
        id:
          $ref: '#/components/schemas/DisplayId'
        title:
          type: string
    GlobalDisplays:
      type: array
      items:
        $ref: '#/components/schemas/GlobalDisplay'
    GlobalViewport:
      type: array
      items:
        type: number
        format: float
      description: |-
        Represents the global screen coordinates.
        If there are multiple screens, the coordinates of the leftmost screen are used as the origin.
    HealthResponse:
      type: object
      required:
      - status
      properties:
        status:
          type: string
    ImportAsset:
      type: object
      description: Request body for `POST /assets/import`.
      required:
      - sourcePath
      - assetId
      - assetType
      properties:
        assetId:
          type: string
          description: Unique asset identifier (e.g. `"vrm:local:my-persona"`).
        assetType:
          $ref: '#/components/schemas/AssetType'
          description: Asset type (`vrm`, `vrma`, `sound`, `image`, `html`).
        description:
          type:
          - string
          - 'null'
          description: Optional human-readable description.
        sourcePath:
          type: string
          description: Absolute path to the source file on the local filesystem.
    ImportAssetResponse:
      type: object
      description: Response body for `POST /assets/import`.
      required:
      - assetId
      properties:
        assetId:
          $ref: '#/components/schemas/AssetId'
    LookAtState:
      oneOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - cursor
      - type: object
        required:
        - entity
        - type
        properties:
          entity:
            type: string
          type:
            type: string
            enum:
            - target
    MetadataBody:
      type: object
      required:
      - metadata
      properties:
        metadata:
          type: object
          additionalProperties:
            type: object
          propertyNames:
            type: string
    ModInfo:
      type: object
      description: Summary of a loaded mod, persisted after discovery.
      required:
      - name
      - version
      - commands
      - assets
      - menus
      - modDir
      properties:
        assets:
          type: object
          description: Assets registered by this mod.
          additionalProperties:
            $ref: '#/components/schemas/AssetDeclaration'
          propertyNames:
            type: string
        author:
          type:
          - string
          - 'null'
        commands:
          type: array
          items:
            type: string
          description: Available MOD command names (paths are not included).
        description:
          type:
          - string
          - 'null'
        license:
          type:
          - string
          - 'null'
        menus:
          type: array
          items:
            $ref: '#/components/schemas/ModMenu'
          description: Menus registered by this mod.
        modDir:
          type: string
          description: Absolute path to the mod's root directory on disk.
        name:
          type: string
        serviceScriptPath:
          type:
          - string
          - 'null'
          description: Service script path (long-running process, auto-launched at startup).
        tray:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/TrayMenuItem'
            description: Tray menu item contributed by this mod.
        version:
          type: string
    ModMenu:
      type: object
      required:
      - id
      - text
      - command
      properties:
        command:
          type: string
        id:
          type: string
        text:
          type: string
    ModMenuMetadata:
      type: object
      required:
      - id
      - modName
      - text
      - command
      properties:
        command:
          type: string
        id:
          type: string
        modName:
          type: string
        text:
          type: string
    ModelDownloadRequest:
      type: object
      description: Request body for model download.
      required:
      - modelSize
      properties:
        modelSize:
          $ref: '#/components/schemas/SttModelSize'
    ModelInfo:
      type: object
      description: Model info for the list endpoint.
      required:
      - modelSize
      - sizeBytes
      - path
      properties:
        modelSize:
          $ref: '#/components/schemas/SttModelSize'
        path:
          type: string
        sizeBytes:
          type: integer
          format: int64
          minimum: 0
    MoveTarget:
      oneOf:
      - type: object
        required:
        - position
        - type
        properties:
          position:
            type: array
            items:
              type: number
              format: float
          type:
            type: string
            enum:
            - world
          z:
            type:
            - number
            - 'null'
            format: float
      - type: object
        required:
        - position
        - type
        properties:
          position:
            type: array
            items:
              type: number
              format: float
          type:
            type: string
            enum:
            - viewport
      description: |-
        Target position for an entity move operation.

        - `World`: Set position in Bevy world coordinates. The `z` field is optional;
          when omitted, the entity's current z-position is preserved.
        - `Viewport`: Set position using global viewport (screen) coordinates,
          which are converted to world coordinates using the active camera.
    NameBody:
      type: object
      properties:
        name:
          type:
          - string
          - 'null'
    NavigationState:
      type: object
      description: Navigation history state of a webview.
      required:
      - canGoBack
      - canGoForward
      properties:
        canGoBack:
          type: boolean
          description: Whether the webview can navigate back in history.
        canGoForward:
          type: boolean
          description: Whether the webview can navigate forward in history.
    OptionalTransform:
      type: object
      properties:
        rotation:
          type:
          - array
          - 'null'
          items:
            type: number
            format: float
        scale:
          type:
          - array
          - 'null'
          items:
            type: number
            format: float
        translation:
          type:
          - array
          - 'null'
          items:
            type: number
            format: float
    PatchPersona:
      type: object
      description: Partial update payload for a persona.
      properties:
        age:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        firstPersonPronoun:
          type:
          - string
          - 'null'
        gender:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/Gender'
        metadata:
          type:
          - object
          - 'null'
          additionalProperties:
            type: object
          propertyNames:
            type: string
        name:
          type:
          - string
          - 'null'
        personality:
          type:
          - string
          - 'null'
        profile:
          type:
          - string
          - 'null'
        thumbnail:
          type:
          - string
          - 'null'
        vrmAssetId:
          type:
          - string
          - 'null'
    Persona:
      type: object
      description: Persona data for a VRM character.
      required:
      - id
      properties:
        age:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        firstPersonPronoun:
          type:
          - string
          - 'null'
        gender:
          $ref: '#/components/schemas/Gender'
        id:
          $ref: '#/components/schemas/PersonaId'
        metadata:
          type: object
          additionalProperties:
            type: object
          propertyNames:
            type: string
        name:
          type:
          - string
          - 'null'
        personality:
          type:
          - string
          - 'null'
        profile:
          type: string
        thumbnail:
          type:
          - string
          - 'null'
        vrmAssetId:
          type:
          - string
          - 'null'
    PersonaFullSnapshot:
      allOf:
      - $ref: '#/components/schemas/Persona'
      - type: object
        required:
        - state
        - transform
        - linkedWebviews
        properties:
          linkedWebviews:
            type: array
            items:
              type: string
            description: Entity IDs of linked webviews (as strings to avoid JS 64-bit precision loss).
          state:
            type: string
            description: Current ephemeral state.
          transform:
            type: object
            description: World-space transform.
          vrm:
            oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/VrmInfo'
              description: VRM-specific data, or `null` if no VRM is attached.
      description: |-
        Full snapshot of a persona including transform, linked webviews, and VRM state.

        Returned by `GET /personas/snapshot`.
    PersonaId:
      type: string
      description: |-
        URL-safe unique identifier for a persona.
        Validation: non-empty, `[a-zA-Z0-9_-]`, max 64 characters.
    PersonaSnapshot:
      allOf:
      - $ref: '#/components/schemas/Persona'
      - type: object
        required:
        - state
        - spawned
        properties:
          spawned:
            type: boolean
            description: Whether this persona has a live ECS entity (i.e. is spawned in the scene).
          state:
            type: string
            description: Current ephemeral state (e.g. "idle", "sitting", "drag").
      description: Persona data combined with ephemeral state, returned by all CRUD endpoints.
    PersonalityBody:
      type: object
      properties:
        personality:
          type:
          - string
          - 'null'
    PickFileRequest:
      type: object
      description: Request body for file picker dialogs.
      properties:
        defaultPath:
          type:
          - string
          - 'null'
          description: Initial directory to open the dialog in.
        filters:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/FileFilter'
          description: File type filters shown in the dialog.
        title:
          type:
          - string
          - 'null'
          description: Dialog window title. Defaults to `"Select File"` or `"Select Files"`.
    PickFileResponse:
      type: object
      description: Response from the single file picker dialog.
      properties:
        path:
          type:
          - string
          - 'null'
          description: The selected file path, or `null` if the user cancelled.
    PickFilesResponse:
      type: object
      description: Response from the multi-file picker dialog.
      required:
      - paths
      properties:
        paths:
          type: array
          items:
            type: string
          description: The selected file paths. Empty if the user cancelled.
    PickFolderRequest:
      type: object
      description: Request body for folder picker dialog.
      properties:
        defaultPath:
          type:
          - string
          - 'null'
          description: Initial directory to open the dialog in.
        title:
          type:
          - string
          - 'null'
          description: Dialog window title. Defaults to `"Select Directory"`.
    PickFolderResponse:
      type: object
      description: Response from the folder picker dialog.
      properties:
        path:
          type:
          - string
          - 'null'
          description: The selected directory path, or `null` if the user cancelled.
    PlatformInfo:
      type: object
      required:
      - os
      - arch
      properties:
        arch:
          type: string
        os:
          type: string
    PlayBody:
      type: object
      description: Request body for playing a VRMA animation.
      required:
      - asset
      properties:
        asset:
          $ref: '#/components/schemas/AssetId'
          description: Asset ID for the VRMA animation to play.
        repeat:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/Repeat'
            description: Repetition behavior of an animation.
        resetSpringBones:
          type:
          - boolean
          - 'null'
          description: If true, resets SpringBone velocities to prevent bouncing during animation transitions.
        transitionSecs:
          type:
          - number
          - 'null'
          format: double
          description: Duration in seconds for the transition of the animation.
        waitForCompletion:
          type:
          - boolean
          - 'null'
          description: If true, the API will wait until the animation finishes.
    PositionResponse:
      type: object
      required:
      - world
      properties:
        globalViewport:
          type:
          - object
          - 'null'
        world:
          type: array
          items:
            type: number
            format: float
    ProcessInfo:
      type: object
      description: Information about a running managed process.
      required:
      - handleId
      - command
      - args
      - pid
      - startedAt
      properties:
        args:
          type: array
          items:
            type: string
          description: Arguments passed to the process.
        command:
          type: string
          description: Full MOD command reference.
        handleId:
          type: string
          description: Unique handle identifier.
        pid:
          type: integer
          format: int32
          description: OS process ID.
          minimum: 0
        startedAt:
          type: string
          description: ISO 8601 timestamp of when the process was started.
    ProfileBody:
      type: object
      required:
      - profile
      properties:
        profile:
          type: string
    PronounBody:
      type: object
      properties:
        firstPersonPronoun:
          type:
          - string
          - 'null'
    PttStartOptions:
      type: object
      description: Request options for starting a PTT session.
      properties:
        language:
          type: string
        modelSize:
          $ref: '#/components/schemas/SttModelSize'
        timeoutSecs:
          type: integer
          format: int64
          minimum: 0
    PttStartResponse:
      type: object
      description: Response for a successful PTT start.
      required:
      - sessionId
      properties:
        sessionId:
          type: string
          format: uuid
    RecognizeOptions:
      type: object
      description: Request options for a stateless recognition call.
      properties:
        language:
          type: string
        modelSize:
          $ref: '#/components/schemas/SttModelSize'
    RegisterRequest:
      type: object
      description: Body for `POST /rpc/register`.
      required:
      - modName
      - methods
      properties:
        methods:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/RpcMethodMeta'
          propertyNames:
            type: string
        modName:
          type: string
    RegistrationsResponse:
      type: object
      description: Response for `GET /rpc/registrations`.
      required:
      - registrations
      properties:
        registrations:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/RpcRegistration'
          propertyNames:
            type: string
    Repeat:
      oneOf:
      - type: object
        description: Loop forever.
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - forever
      - type: object
        description: Play once and stop.
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - never
      - type: object
        description: Repeat a fixed number of times.
        required:
        - count
        - type
        properties:
          count:
            type: integer
            format: int32
            description: Number of repetitions.
            minimum: 0
          type:
            type: string
            enum:
            - count
      description: Repetition behavior of a VRMA animation.
    RpcMethodMeta:
      type: object
      description: Metadata for a single RPC method.
      properties:
        description:
          type:
          - string
          - 'null'
        timeout:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
    RpcRegistration:
      type: object
      description: A single MOD's RPC registration.
      required:
      - port
      - methods
      properties:
        methods:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/RpcMethodMeta'
          propertyNames:
            type: string
        port:
          type: integer
          format: int32
          minimum: 0
    SePlayRequest:
      type: object
      required:
      - asset
      properties:
        asset:
          $ref: '#/components/schemas/AssetId'
        panning:
          type: number
          format: double
        speed:
          type: number
          format: double
        volume:
          type: number
          format: double
    SetFpsBody:
      type: object
      required:
      - fps
      properties:
        fps:
          type: number
          format: double
          description: Frame rate in frames per second.
    SetLinkedPersonaRequest:
      type: object
      description: Request body for setting the linked persona on a webview.
      required:
      - personaId
      properties:
        personaId:
          $ref: '#/components/schemas/PersonaId'
          description: The persona ID to link to this webview.
    ShadowPanelPutBody:
      type: object
      required:
      - alpha
      properties:
        alpha:
          type: number
          format: float
          description: |-
            The alpha value for the shadow panel.

            Range: `0.0` (fully transparent) to `1.0` (fully opaque).
    SignalInfo:
      type: object
      description: Information about an active signal channel.
      required:
      - signal
      - subscribers
      properties:
        signal:
          type: string
          description: The signal channel name.
        subscribers:
          type: integer
          description: The number of active subscribers.
          minimum: 0
    SpringBoneChain:
      type: object
      required:
      - entity
      - joints
      - props
      properties:
        entity:
          type: string
        joints:
          type: array
          items:
            type: string
        props:
          $ref: '#/components/schemas/SpringBoneProps'
    SpringBoneChainsResponse:
      type: object
      required:
      - chains
      properties:
        chains:
          type: array
          items:
            $ref: '#/components/schemas/SpringBoneChain'
    SpringBoneProps:
      type: object
      required:
      - stiffness
      - dragForce
      - gravityPower
      - gravityDir
      - hitRadius
      properties:
        dragForce:
          type: number
          format: float
        gravityDir:
          type: array
          items:
            type: number
            format: float
        gravityPower:
          type: number
          format: float
        hitRadius:
          type: number
          format: float
        stiffness:
          type: number
          format: float
    SpringBonePropsUpdate:
      type: object
      properties:
        dragForce:
          type:
          - number
          - 'null'
          format: float
        gravityDir:
          type:
          - array
          - 'null'
          items:
            type: number
            format: float
        gravityPower:
          type:
          - number
          - 'null'
          format: float
        hitRadius:
          type:
          - number
          - 'null'
          format: float
        stiffness:
          type:
          - number
          - 'null'
          format: float
    StampRequestBody:
      allOf:
      - type:
        - object
        - 'null'
      - type: object
        required:
        - asset
        properties:
          asset:
            $ref: '#/components/schemas/AssetId'
    StartProcessRequest:
      type: object
      description: Request to start a managed process.
      required:
      - command
      properties:
        args:
          type: array
          items:
            type: string
          description: Arguments forwarded to the process as CLI args.
        command:
          type: string
          description: Full MOD command reference (`mod-name:bin-name`).
    StartProcessResponse:
      type: object
      description: Response from starting a managed process.
      required:
      - handleId
      properties:
        handleId:
          type: string
          description: Unique handle ID for the started process.
    StateBody:
      type: object
      required:
      - state
      properties:
        state:
          type: object
    SttModelSize:
      type: string
      description: Whisper model size variants.
      enum:
      - tiny
      - base
      - small
      - medium
      - large-v3-turbo
      - large-v3
    SttResult:
      type: object
      description: Result of a single speech recognition.
      required:
      - text
      - timestamp
      - language
      properties:
        language:
          type: string
          description: Detected or specified language code.
        text:
          type: string
          description: The recognized text.
        timestamp:
          type: number
          format: double
          description: Timestamp offset from request start (seconds, f64).
    ThumbnailBody:
      type: object
      properties:
        thumbnail:
          type:
          - string
          - 'null'
    TimelineBody:
      allOf:
      - type:
        - object
        - 'null'
      - type: object
        required:
        - audio
        - keyframes
        properties:
          audio:
            type: string
          keyframes:
            type: array
            items:
              $ref: '#/components/schemas/TimelineKeyframe'
    TimelineKeyframe:
      type: object
      description: A single keyframe in a speech timeline.
      required:
      - duration
      properties:
        duration:
          type: number
          format: float
          description: Duration of this keyframe in seconds.
        targets:
          type: object
          description: |-
            Expression targets to set during this keyframe.
            Keys are expression names (e.g. "aa", "ih", "happy"), values are weights (0.0-1.0).
          additionalProperties:
            type: number
            format: float
          propertyNames:
            type: string
    TransformArgs:
      type: object
      description: |-
        Partial transform arguments for API requests.
        All fields are optional — omitted fields retain their current value.
      properties:
        rotation:
          type:
          - array
          - 'null'
          items:
            type: number
            format: float
        scale:
          type:
          - array
          - 'null'
          items:
            type: number
            format: float
        translation:
          type:
          - array
          - 'null'
          items:
            type: number
            format: float
    TrayMenuItem:
      type: object
      description: |-
        A single tray menu entry contributed by a mod.

        Has either `command` (leaf — clickable) or `items` (submenu), never both.
      required:
      - id
      - text
      properties:
        command:
          type:
          - string
          - 'null'
        id:
          type: string
        items:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/TrayMenuItem'
        position:
          type:
          - string
          - 'null'
          description: |-
            Display position in the tray menu: `"top"`, `"middle"`, or `"bottom"`.
            Defaults to `"middle"` when omitted or invalid.
        text:
          type: string
    TweenPositionRequest:
      type: object
      required:
      - target
      - durationMs
      properties:
        durationMs:
          type: integer
          format: int64
          minimum: 0
        easing:
          $ref: '#/components/schemas/EasingFunction'
        target:
          type: array
          items:
            type: number
            format: float
        wait:
          type: boolean
    TweenRotationRequest:
      type: object
      required:
      - target
      - durationMs
      properties:
        durationMs:
          type: integer
          format: int64
          minimum: 0
        easing:
          $ref: '#/components/schemas/EasingFunction'
        target:
          type: array
          items:
            type: number
            format: float
        wait:
          type: boolean
    TweenScaleRequest:
      type: object
      required:
      - target
      - durationMs
      properties:
        durationMs:
          type: integer
          format: int64
          minimum: 0
        easing:
          $ref: '#/components/schemas/EasingFunction'
        target:
          type: array
          items:
            type: number
            format: float
        wait:
          type: boolean
    VrmInfo:
      type: object
      description: VRM-specific rendering state nested within a persona full snapshot.
      required:
      - assetId
      - expressions
      - animations
      - springBones
      properties:
        animations:
          type: array
          items:
            $ref: '#/components/schemas/VrmaInfo'
        assetId:
          type: string
        expressions:
          $ref: '#/components/schemas/ExpressionsResponse'
        lookAt:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/LookAtState'
        springBones:
          type: object
    VrmaInfo:
      type: object
      required:
      - entity
      - name
      - playing
      properties:
        entity:
          type: string
        name:
          type: string
        playing:
          type: boolean
    WebviewConstraints:
      type: object
      description: |-
        API-facing constraint parameters for HTTP/MCP.
        Maps to the fields of `TransformConstraint`.
      properties:
        lockScale:
          type:
          - boolean
          - 'null'
          description: Whether to lock scale at 1.0 regardless of parent scale.
        maxTiltDegrees:
          type:
          - number
          - 'null'
          format: float
          description: Maximum tilt angle from upright in degrees. 0.0 = no tilt allowed.
        rotationFollow:
          type:
          - number
          - 'null'
          format: float
          description: How much rotation to inherit from parent. 0.0 = billboard, 1.0 = full inherit.
    WebviewInfo:
      type: object
      description: Response for GET /webviews and GET /webviews/{entity}
      required:
      - entity
      - source
      - size
      - viewportSize
      - transform
      - constraints
      properties:
        constraints:
          $ref: '#/components/schemas/WebviewConstraints'
          description: Active constraint parameters.
        entity:
          type: string
        linkedPersona:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/PersonaId'
        size:
          type: array
          items:
            type: number
            format: float
        source:
          $ref: '#/components/schemas/WebviewSourceInfo'
        transform:
          $ref: '#/components/schemas/TransformArgs'
          description: Current transform (translation = intended offset from parent).
        viewportSize:
          type: array
          items:
            type: number
            format: float
    WebviewNavigateRequest:
      type: object
      description: Request for POST /webviews/{entity}/navigate
      required:
      - source
      properties:
        source:
          $ref: '#/components/schemas/WebviewSource'
    WebviewOpenOptions:
      type: object
      description: Request body for POST /webviews
      required:
      - source
      properties:
        constraints:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WebviewConstraints'
            description: Transform constraint parameters for parent transform propagation.
        linkedPersona:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/PersonaId'
            description: Persona to link to this webview (optional).
        resizable:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WebviewResizableOptions'
            description: Enable drag-to-resize. Omit or set to null to disable.
        size:
          type:
          - array
          - 'null'
          items:
            type: number
            format: float
          description: 'Mesh size in world units. Default: [0.7, 0.7].'
        source:
          $ref: '#/components/schemas/WebviewSource'
          description: The source of the webview (URL, local path, or inline HTML).
        transform:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/TransformArgs'
            description: Transform for positioning. translation sets the offset from parent.
        viewportSize:
          type:
          - array
          - 'null'
          items:
            type: number
            format: float
          description: 'Viewport resolution in pixels. Default: [800, 800].'
    WebviewPatchRequest:
      type: object
      description: Request for PATCH /webviews/{entity}
      properties:
        constraints:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WebviewConstraints'
            description: Constraint parameters update (partial merge).
        size:
          type:
          - array
          - 'null'
          items:
            type: number
            format: float
        transform:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/TransformArgs'
            description: Transform update (translation updates the offset from parent).
        viewportSize:
          type:
          - array
          - 'null'
          items:
            type: number
            format: float
    WebviewResizableOptions:
      type: object
      description: |-
        Options for enabling drag-to-resize on a webview.
        All fields are optional; omitted fields use bevy_cef defaults.
      properties:
        aspectLock:
          $ref: '#/components/schemas/AspectLockMode'
          description: 'Aspect ratio lock mode. Default: "lockOnShift".'
        edgeThickness:
          type: integer
          format: int32
          description: 'Width of the invisible resize border in texture pixels. Default: 16.'
          minimum: 0
        maxSize:
          type:
          - array
          - 'null'
          items:
            type: integer
            format: int32
            minimum: 0
          description: Maximum texture size in pixels. None = no limit.
        minSize:
          type: array
          items:
            type: integer
            format: int32
            minimum: 0
          description: 'Minimum texture size in pixels. Default: [100, 100].'
    WebviewSource:
      oneOf:
      - type: object
        description: URL or module path (mods://, asset://, https://, etc.)
        required:
        - url
        - type
        properties:
          type:
            type: string
            enum:
            - url
          url:
            type: string
      - type: object
        description: Raw HTML content
        required:
        - content
        - type
        properties:
          content:
            type: string
          type:
            type: string
            enum:
            - html
      - type: object
        description: Local HTML asset by registry ID
        required:
        - id
        - type
        properties:
          id:
            $ref: '#/components/schemas/AssetId'
          type:
            type: string
            enum:
            - local
      description: |-
        Webview source specification (request).
        Either a URL/module path or inline HTML content.
    WebviewSourceInfo:
      oneOf:
      - type: object
        required:
        - url
        - type
        properties:
          type:
            type: string
            enum:
            - url
          url:
            type: string
      - type: object
        required:
        - type
        properties:
          content:
            type:
            - string
            - 'null'
          type:
            type: string
            enum:
            - html
      - type: object
        required:
        - id
        - type
        properties:
          id:
            $ref: '#/components/schemas/AssetId'
          type:
            type: string
            enum:
            - local
      description: |-
        Webview source information (response).
        In list responses (GET /webviews), Html content is omitted (None).
        In detail responses (GET /webviews/{id}), Html content is included.
    WeightsBody:
      type: object
      required:
      - weights
      properties:
        weights:
          type: object
          additionalProperties:
            type: number
            format: float
          propertyNames:
            type: string
