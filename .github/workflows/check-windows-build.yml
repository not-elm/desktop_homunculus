name: Check Windows Build

on:
  workflow_dispatch:

concurrency:
  group: check-windows-build
  cancel-in-progress: true

jobs:
  resolve-version:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{ s/^version = "\(.*\)"/\1/p; }' engine/Cargo.toml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-engine-windows:
    needs: resolve-version
    runs-on: windows-2022
    timeout-minutes: 90
    permissions:
      contents: read
    defaults:
      run:
        working-directory: engine
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-engine-build
        with:
          shared-key: x64-engine-dist
          cef-cache-key: cef-windows-x64-144.4.0

      - name: Clean stale CEF files from target cache
        run: |
          rm -f target/dist/*.dll target/dist/*.pak target/dist/*.dat target/dist/*.bin
          rm -rf target/dist/locales/
          rm -f target/dist/bevy_cef_render_process.exe

      - name: Build MSI installer
        run: python scripts/release_windows.py
        env:
          SKIP_GEN_CREDITS: "1"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: engine-windows-x64
          path: engine/target/bundle/desktop-homunculus-${{ needs.resolve-version.outputs.version }}-x64.msi
