name: Codex Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: codex-review-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    # Only run on PR comments that are exactly "/codex-review"
    if: >-
      github.event.issue.pull_request
      && github.event.comment.body == '/codex-review'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Gate — check permissions and fetch PR metadata
        id: gate
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ github.token }}
          script: |
            const commenter = context.payload.comment.user.login;

            // Check commenter has write+ permission
            const { data: permData } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: commenter,
            });
            const perm = permData.permission;
            if (perm !== 'write' && perm !== 'admin') {
              core.info(`User ${commenter} has '${perm}' permission — skipping review`);
              core.setOutput('allowed', 'false');
              return;
            }

            // Fetch PR details
            const prNumber = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            // Block fork PRs — secrets should not be used on untrusted code
            if (pr.head.repo.full_name !== pr.base.repo.full_name) {
              core.info(`Fork PR detected (${pr.head.repo.full_name}) — skipping review`);
              core.setOutput('allowed', 'false');
              return;
            }

            core.setOutput('allowed', 'true');
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('base_sha', pr.base.sha);
            core.setOutput('head_sha', pr.head.sha);

      - name: Checkout PR merge ref
        if: steps.gate.outputs.allowed == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: refs/pull/${{ steps.gate.outputs.pr_number }}/merge

      - name: Pre-fetch base and head refs
        if: steps.gate.outputs.allowed == 'true'
        run: |
          git fetch --no-tags origin \
            +${{ steps.gate.outputs.base_sha }}:refs/remotes/origin/__codex_base__ \
            +refs/pull/${{ steps.gate.outputs.pr_number }}/head:refs/remotes/origin/__codex_head__

      - name: Run Codex review
        if: steps.gate.outputs.allowed == 'true'
        id: codex
        continue-on-error: true
        uses: openai/codex-action@94bb7a052e529936e5260a35838e61b190855739 # v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          output-file: codex-output.md
          sandbox: read-only
          safety-strategy: drop-sudo

      - name: Post review comment
        if: steps.gate.outputs.allowed == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ github.token }}
          script: |
            const body = process.env.CODEX_OUTPUT?.trim();
            const outcome = process.env.CODEX_OUTCOME;
            const prNumber = parseInt(process.env.PR_NUMBER, 10);

            let reviewBody;
            if (outcome === 'success' && body) {
              reviewBody = `## Codex Review\n\n${body}`;
            } else if (!body && outcome === 'failure') {
              // Likely a quota or auth error — Codex exited without producing output
              reviewBody = [
                '## Codex Review',
                '',
                'Codex review could not be completed: **OpenAI API quota exceeded** or authentication error.',
                'Please check your OpenAI plan and billing details.',
              ].join('\n');
            } else {
              reviewBody = [
                '## Codex Review',
                '',
                'Codex review could not be completed for this run.',
                '',
                `Step outcome: \`${outcome}\``,
              ].join('\n');
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: 'COMMENT',
              body: reviewBody,
            });
        env:
          CODEX_OUTPUT: ${{ steps.codex.outputs.final-message }}
          CODEX_OUTCOME: ${{ steps.codex.outcome }}
          PR_NUMBER: ${{ steps.gate.outputs.pr_number }}
